<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link href='https://fonts.googleapis.com/css?family=Bitcount Single' rel='stylesheet'>
    <title>Proof of Concept</title>
    <style>
      body { 
        margin: 0;
        font-family: 'Bitcount Single';font-size: 48px;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <script src="../JS/POC.js"></script>
    <center>
    <p> This is a proof of concept</p>
    </center>

    <!-- Background Colour -->
    <style>
    body {
      background-color: #e6e6e6;
    }

    * {
      box-sizing: border-box;
    }    
    
    /*https://www.w3schools.com/css/css3_flexbox_responsive.asp*/

    /*for the imgs */
    .container > img {
      display:none;
      top: 50%; 
      left: 50%; 
      width:1000px; 
      -ms-transform: 
      translate(-50%, -50%); 
      transform: translate(-50%, -50%);
      border: 3px solid black;
    };

    .centered {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;  /* prevents edge touch on small screens */
    }
  
    /*button container*/
    .bContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      padding: 10% 2px;
      width:70%;
      margin: 0 auto;
    }
    
    .block {
      flex: 25%;
      max-width: 200px;
      padding: 0 4px;
    }


    @media screen and (max-width:1500px) {
      .bContainer {
        width: 100%;
        padding: 35% 80px;
        justify-content:space-between;
      }
    }

    .block button {
      background-color: rgb(153, 167, 172); /*background */
      border: 4px ridge black; /*border */
      border-radius: 15px 50px;
    

      color: black; /*text */
      font-family: 'Bitcount Single';
      font-size: 30px;
      cursor: pointer; /* Pointer/hand icon */
      /*float: left; /* Float the buttons side by side */

      /*width:350px;*/
      margin-top: 8px;
      vertical-align: middle;
      padding: 20px 30px;  
      margin-bottom: 10px;
    }
    

    @media screen and (max-height: 1500px) {
      .block button {
        font-size: 40%;
        padding: 10px 20px;  
      }
    }

    @media screen and (max-height: 1000px) {
      .block button {
        font-size: 40%;
        padding: 10px 20px;  
      }
    }

    .block button:hover {
      background-color: rgb(255, 2, 2) ;
      color: rgb(255, 255, 255); /*text*/
    }

    .blockContainer {
      display: grid;
      place-content: center;  /* centers the grid tracks themselves */
      min-height: 1vh;
      flex-direction: column;
      align-items: center;
      align-content:center;
      /*background-color: DodgerBlue;*/
    }

    </style>
    
    <a href="index.html">
        <img src="../Public/stamp512.png" alt="Home Page" 
        style="
          position: fixed;
          z-index: 2; 
          width: 5%; 
          padding: 10px;
          top:0px;
        ">
    </a>
    
    <div class = "bContainer">
      <div class="block">
        <button onclick="toggleLArm()">Human Left Arm</button>
        <button onclick="toggleRArm()">Human Right Arm</button>
        <button onclick="togglebigArmL()">Big Arm Left</button>
        <button onclick="togglebigArmR()">Big Arm Right</button>

        <button  onclick="toggleLeg1()">Leg 1</button>
        <button onclick="toggleLeg2()">Leg 2</button>
      </div>

      <div class="block"> 
        <button onclick="togglehead()">Head Antennae</button>

        <button onclick="toggleBackAL()">Back Arm Left</button>
        <button onclick="toggleBackAR()">Back Arm Right</button>
        <button onclick="togglewingL()">Wing Left</button>
        <button onclick="togglewingR()">Wing Right</button>
      </div>
    </div>
  
    <div class="container centered"> 
      <img id= "Body" src="../Public/POC/Base-Body.png" style ="position:absolute; display: block; z-index:-3;">
      <img id="ArmL" src="../Public/POC/hArmL.png" style ="position:absolute; z-index:-2;">
      <img id="ArmR" src="../Public/POC/hArmR.png" style ="position:absolute; z-index:-2;">
      <img id="bigArmL" src="../Public/POC/bigArmL.png" style ="position:absolute;z-index:-1;">
      <img id="bigArmR" src="../Public/POC/bigArmR.png" style ="position:absolute;z-index:-1;">

      <img id="Leg1" src="../Public/POC/LegR.png" style ="position:absolute; z-index:-1;">
      <img id="Leg2" src="../Public/POC/Leg2R.png" style ="position:absolute; z-index:-1;">
      
      <img id="head" src="../Public/POC/Head.png" style ="position:absolute; z-index:-1;">

      <img id="bAL" src="../Public/POC/backArmL.png" style ="position:absolute; z-index:-4;">
      <img id="bAR" src="../Public/POC/backArmR.png" style ="position:absolute; ;z-index:-4;">
      <img id="wingL" src="../Public/POC/wingL.png" style ="position:absolute; z-index:-4;">
      <img id="wingR" src="../Public/POC/wingR.png" style ="position:absolute; z-index:-4;">

    </div>
    <script>
      toggleLArm()
      toggleRArm()
      togglebigArmL()
      togglebigArmR()
      toggleLeg1()
      toggleLeg2()
      togglehead()
      toggleBackAL()
      toggleBackAR()
      togglewingL()
      togglewingR()
    </script>

    

  </body>
</html>
